extras = ["storage", "secure", "observability"]
services = ["postgresql", "redis", "minio", "qdrant", "rabbitmq", "otlp"]
timeout_seconds = 180
expected_artifacts = ["services.json"]
required_secrets = [
  "POSTGRES_HOST",
  "POSTGRES_PORT",
  "POSTGRES_DB",
  "POSTGRES_USER",
  "POSTGRES_PASSWORD",
  "REDIS_HOST",
  "REDIS_PORT",
  "MINIO_ENDPOINT",
  "MINIO_ACCESS_KEY",
  "MINIO_SECRET_KEY",
  "QDRANT_URL",
  "RABBITMQ_URL",
  "OTLP_HTTP_ENDPOINT",
]

