name: Verify and create release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify PyPI wheel and create GitHub release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Find successful main CI run for tagged commit
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          run_id="$(gh run list \
            --workflow ci.yml \
            --commit "$GITHUB_SHA" \
            --status success \
            --json databaseId,event,headBranch \
            --jq '[.[] | select(.event == "push" and .headBranch == "main")][0].databaseId')"
          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "No successful main CI run exists for $GITHUB_SHA" >&2
            exit 1
          fi
          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download exact tested wheel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: praval-${{ github.sha }}
          path: release
          github-token: ${{ github.token }}
          run-id: ${{ steps.ci-run.outputs.run-id }}
      - name: Download exact-wheel documentation manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: praval-docs-${{ github.sha }}
          path: documentation
          github-token: ${{ github.token }}
          run-id: ${{ steps.ci-run.outputs.run-id }}
      - name: Verify tag, wheel, documentation, and PyPI
        shell: bash
        run: |
          (cd release/dist && shasum -a 256 -c ../evidence/SHA256SUMS)
          python scripts/validate_distribution.py release/dist --tag "$GITHUB_REF_NAME"
          python scripts/verify_pypi_wheel.py \
            release/evidence/build-manifest.json \
            --version "${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          build = json.loads(Path("release/evidence/build-manifest.json").read_text())
          docs = json.loads(Path("documentation/documentation-manifest.json").read_text())
          wheel = build["artifacts"][0]
          expected = {
              "commit": os.environ["GITHUB_SHA"],
              "version": os.environ["GITHUB_REF_NAME"].removeprefix("v"),
              "wheel_sha256": wheel["sha256"],
          }
          actual = {key: docs.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"Documentation provenance mismatch: {actual} != {expected}")
          PY
          notes="docs/releases/RELEASE_NOTES_${GITHUB_REF_NAME#v}.md"
          if [[ ! -f "$notes" ]]; then
            echo "Release notes not found: $notes" >&2
            exit 1
          fi
          mkdir -p verified
          cp release/dist/*.whl verified/
          cp release/evidence/SHA256SUMS verified/
          cp release/evidence/build-manifest.json verified/
          cp documentation/documentation-manifest.json verified/
          cp "$notes" verified/RELEASE_NOTES.md
      - name: Upload verified release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verified-release-${{ github.sha }}
          path: verified/
          if-no-files-found: error
          retention-days: 30
      - name: Attach exact wheel and evidence to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          verified/*.whl
          verified/SHA256SUMS
          verified/build-manifest.json
          verified/documentation-manifest.json
          --verify-tag
          --title "Praval $GITHUB_REF_NAME"
          --notes-file verified/RELEASE_NOTES.md
